<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IMG Platform - Entre para acessar o hub de jogos e o ecossistema IMG">
    <title>IMG Platform - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127795;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">&#127807;</div>
                <h1 class="game-title">IMG Platform</h1>
                <p class="game-subtitle">Entre no hub da plataforma e acesse o IMG online com login unico</p>
            </div>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon">&#127969;</span>
                    <span>Hub central</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">&#127795;</span>
                    <span>IMG online</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">&#128167;</span>
                    <span>Perfil compartilhado</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">&#127822;</span>
                    <span>Base pronta para novos jogos</span>
                </div>
            </div>

            <button class="google-btn" id="googleLoginBtn" type="button">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Entrar com Google
            </button>

            <!-- Dev Login (only visible when APP_ENV=local) -->
            <div id="devLoginSection" style="display:none;">
                <div style="display:flex; align-items:center; gap:8px; margin:16px 0 12px;">
                    <div style="flex:1; height:1px; background:rgba(255,255,255,.12);"></div>
                    <span style="color:#6ee7b7; font-size:.8rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em;">Dev Mode</span>
                    <div style="flex:1; height:1px; background:rgba(255,255,255,.12);"></div>
                </div>
                <input type="text" id="devName" placeholder="Nome" style="width:100%; padding:10px 14px; margin-bottom:8px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); color:#e2e8f0; font-family:inherit; font-size:.95rem; box-sizing:border-box;">
                <input type="email" id="devEmail" placeholder="Email" style="width:100%; padding:10px 14px; margin-bottom:12px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); color:#e2e8f0; font-family:inherit; font-size:.95rem; box-sizing:border-box;">
                <button id="devLoginBtn" type="button" style="width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(135deg, #10b981, #059669); color:#fff; font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity .2s;">
                    🔧 Entrar como Dev
                </button>
            </div>

            <p class="error-msg" id="errorMsg" style="display:none;"></p>
        </div>

        <p class="footer">Plataforma de jogos com Three.js e backend compartilhado</p>
    </div>

    <script src="js/config.js?v=14"></script>
    <script src="shared/js/auth.js?v=1"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const HUB_PATH = '/hub.html';

        function normalizeApiForRedirect(value) {
            if (typeof value !== 'string' || !value.trim()) {
                return '';
            }

            try {
                const parsed = new URL(value.trim(), window.location.origin);
                if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                    return '';
                }
                return parsed.origin;
            } catch (error) {
                return '';
            }
        }

        function resolveHubRedirectPath() {
            const explicitApi = normalizeApiForRedirect(params.get('api'));
            const apiOrigin = explicitApi || normalizeApiForRedirect(window.API_URL);
            if (!apiOrigin || apiOrigin === window.location.origin) {
                return HUB_PATH;
            }
            return `${HUB_PATH}?api=${encodeURIComponent(apiOrigin)}`;
        }

        const hubRedirectPath = resolveHubRedirectPath();
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        googleLoginBtn?.addEventListener('click', () => {
            loginWithGoogle(hubRedirectPath);
        });

        (async function init() {
            // Heartbeat with Freeze Detector
            let lastPulse = Date.now();
            setInterval(() => {
                const now = Date.now();
                const gap = now - lastPulse;
                if (gap > 2000) {
                    console.warn(`[LOGIN-FREEZE-DETECTOR] ⚠️ UI Thread blocked for ${gap}ms!`);
                }
                lastPulse = now;

                let jsHeap = 'N/A';
                if (window.performance && window.performance.memory) {
                    const mem = window.performance.memory;
                    jsHeap = `${(mem.usedJSHeapSize / 1024 / 1024).toFixed(2)}MB / ${(mem.totalJSHeapSize / 1024 / 1024).toFixed(2)}MB`;
                }
                console.log(`[LOGIN-HEARTBEAT] 🕒 Alive at ${new Date().toLocaleTimeString()} | 🧠 Memory: ${jsHeap}`);
            }, 1000);

            // Check if we just bounced from the hub in a loop
            const loopKey = `platform_auth_redirect:${HUB_PATH}`;
            const lastRedirect = Number(sessionStorage.getItem(loopKey)) || 0;
            const now = Date.now();

            console.info('[Login] Initialization starting...', {
                lastHubRedirect: lastRedirect ? new Date(lastRedirect).toLocaleTimeString() : 'none',
                time: new Date().toLocaleTimeString()
            });

            console.debug('[Login] Checking authentication...');
            const user = await checkAuth();
            
            if (user && !user.error) {
                console.info('[Login] User already authenticated:', user.name);
                // If we were just redirected here due to a 401 on the hub within 10s,
                // but checkAuth thinks we are OK, there is a sync issue.
                // Stop the loop and show error.
                if (now - lastRedirect < 10000) {
                    console.error('[Login] Sync issue: checkAuth succeeded but hub auth failed just now.');
                    const errorMsg = document.getElementById('errorMsg');
                    if (errorMsg) {
                        errorMsg.textContent = 'Erro de sincronizacao de sessao. Limpe o cache do navegador.';
                        errorMsg.style.display = 'block';
                    }
                    return;
                }
                console.info('[Login] Redirecting to Hub.');
                window.location.replace(hubRedirectPath);
            } else {
                console.debug('[Login] No valid session found. Ready for user interaction.');
            }
        })();

        if (params.get('error')) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Erro ao fazer login. Tente novamente.';
            errorMsg.style.display = 'block';
        }

        // Dev login initialization
        (async function initDevLogin() {
            const devMode = await checkDevMode();
            if (!devMode?.devLoginEnabled) {
                return;
            }

            const devSection = document.getElementById('devLoginSection');
            const devNameInput = document.getElementById('devName');
            const devEmailInput = document.getElementById('devEmail');
            const devLoginBtn = document.getElementById('devLoginBtn');

            if (!devSection || !devNameInput || !devEmailInput || !devLoginBtn) {
                return;
            }

            devNameInput.value = devMode.defaultName || 'Dev User';
            devEmailInput.value = devMode.defaultEmail || 'dev@localhost';
            devSection.style.display = 'block';

            devLoginBtn.addEventListener('click', async () => {
                devLoginBtn.disabled = true;
                devLoginBtn.textContent = '⏳ Entrando...';

                const result = await loginAsDev(
                    devNameInput.value.trim(),
                    devEmailInput.value.trim()
                );

                if (result?.ok) {
                    window.location.replace(result.redirectTo || '/hub.html');
                } else {
                    devLoginBtn.disabled = false;
                    devLoginBtn.textContent = '🔧 Entrar como Dev';
                    const errorMsg = document.getElementById('errorMsg');
                    if (errorMsg) {
                        errorMsg.textContent = 'Erro no login dev. Verifique o backend.';
                        errorMsg.style.display = 'block';
                    }
                }
            });
        })();
    </script>
</body>
</html>
