<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Garden Quest - Um jogo 3D de exploração em um jardim mágico">
    <title>Garden Quest — Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">🌿</div>
                <h1 class="game-title">Garden Quest</h1>
                <p class="game-subtitle">Explore o jardim, colete frutas e descubra seu caminho</p>
            </div>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon">🏡</span>
                    <span>Sua casa</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🌳</span>
                    <span>Árvores frutíferas</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">💧</span>
                    <span>Lago cristalino</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🍎</span>
                    <span>Colete maçãs</span>
                </div>
            </div>

            <button class="google-btn" id="googleLoginBtn" onclick="loginWithGoogle()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Entrar com Google
            </button>

            <p class="error-msg" id="errorMsg" style="display:none;"></p>
        </div>

        <p class="footer">Feito com 💚 e Three.js</p>
    </div>

    <script src="js/config.js?v=13"></script>
    <script src="js/auth.js?v=9"></script>
    <script>
        const params = new URLSearchParams(window.location.search);

        // AUTO-REDIRECT: Check if the secure session cookie is already valid.
        (async function init() {
            const user = await checkAuth();
            if (user && !user.error) {
                console.log('User authenticated, redirecting to game...');
                window.location.replace('game.html');
            }
        })();

        // Check for auth errors in URL
        if (params.get('error')) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Erro ao fazer login. Tente novamente.';
            errorMsg.style.display = 'block';
        }

        // Floating particles background
        const container = document.getElementById('bgParticles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (15 + Math.random() * 20) + 's';
            particle.style.fontSize = (12 + Math.random() * 24) + 'px';
            particle.style.opacity = 0.15 + Math.random() * 0.3;
            particle.textContent = ['🍃', '🌿', '🍂', '✨', '🌸'][Math.floor(Math.random() * 5)];
            container.appendChild(particle);
        }
    </script>
</body>
</html>
